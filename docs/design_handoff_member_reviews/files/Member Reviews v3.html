<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>더블랙 — 회원 이야기 V3</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="reviews.css" />
<link rel="stylesheet" href="reviews-v3.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="reviews-data.jsx"></script>
<script type="text/babel" src="reviews-components.jsx"></script>
<script type="text/babel" src="reviews-v3.jsx"></script>

<script type="text/babel" data-presets="react">

const DEFAULT_TWEAKS = /*EDITMODE-BEGIN*/{
  "sectionBg": "#FFFFFF",
  "titleAccent": "#C12838",
  "highlightStyle": "mixed"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = window.useTweaks(DEFAULT_TWEAKS);

  React.useEffect(() => {
    document.documentElement.style.setProperty("--accent", t.titleAccent);
  }, [t.titleAccent]);

  return (
    <>
      <div className="rv-topbar">
        <div className="rv-topbar__inner">
          <span>홈</span><span>더블랙 소개</span><span>회원 이야기</span>
        </div>
      </div>

      <section className="kb-page-hero">
        <div className="kb-page-hero__eyebrow">DOUBLE BLACK · MEMBER STORIES</div>
        <h1>회원들의 일상 속<br />진짜 만남을 만듭니다</h1>
        <p>매너 4점 만점, 외모 3점 이상의 만남에서 직접 작성된 후기입니다. 가로로 스크롤하며 한 분 한 분의 이야기를 확인해보세요.</p>
      </section>

      <section style={{background: t.sectionBg}}>
        <window.KbCarousel reviews={
          // 사용자가 제공한 후기 7개 + 가장 긴 PDF 후기 1개 = 총 8개
          [2, 18, 13, 10, 8, 12, 6, 23]
            .map((r) => window.REVIEW_DATA.find((x) => x.rank === r))
            .filter(Boolean)
        } />
      </section>

      {window.TweaksPanel && (
        <window.TweaksPanel title="Tweaks">
          <window.TweakSection label="컬러">
            <window.TweakColor
              label="섹션 배경"
              value={t.sectionBg}
              options={["#FFFFFF", "#FAFAFA", "#F5F1EA", "#1A1A1A"]}
              onChange={(v) => setTweak("sectionBg", v)}
            />
            <window.TweakColor
              label="제목 강조 컬러"
              value={t.titleAccent}
              options={["#C12838", "#1A1A1A", "#3B57DE", "#E84C8B"]}
              onChange={(v) => setTweak("titleAccent", v)}
            />
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
